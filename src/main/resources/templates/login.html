<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - rusty's InfraStructure</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            border: 2px solid black;
            padding: 40px;
            width: 320px;
        }
        .login-box h2 {
            margin: 0 0 24px 0;
            text-align: center;
            font-size: 18px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 16px;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 4px;
            color: #444;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .btn-login {
            width: 100%;
            padding: 10px;
            background: #333;
            color: white;
            border: none;
            border-radius: 3px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-login:hover { background: #000; }
        .error-msg {
            background: #fff0f0;
            border: 1px solid #f44;
            color: #c00;
            padding: 8px 10px;
            font-size: 13px;
            border-radius: 3px;
            margin-bottom: 14px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
            color: #666;
            text-decoration: none;
        }
        .back-link:hover { color: #000; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 관리자 로그인</h2>

    <div class="error-msg" th:if="${param.error}">
        아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <form action="/login" method="post">
        <div class="form-group">
            <label for="username">아이디</label>
            <input type="text" id="username" name="username" autofocus>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" name="password">
        </div>
        <button type="submit" class="btn-login">로그인</button>
    </form>

    <a href="/" class="back-link">← 대시보드로 돌아가기</a>
</div>
</body>
</html>
