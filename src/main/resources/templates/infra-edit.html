<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>인프라 정보 관리</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f4; }
        .tier-card { background: white; border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        .tier-header { font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .tier-header input { font-size: 16px; font-weight: bold; padding: 5px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        th { background-color: #eee; font-size: 14px; }
        input[type="text"] { width: 90%; padding: 4px; }
        .btn-save { background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }

        /* 배포 설정 행 */
        .deploy-config-row td { background: #f0f4ff; text-align: left; padding: 10px 15px; }
        .deploy-config-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 6px; }
        .deploy-config-grid .field-group { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: #555; }
        .deploy-config-grid input[type="text"] { width: 95%; font-size: 12px; }
        .btn-deploy-toggle { font-size: 11px; background: #6c757d; color: white; border: none; border-radius: 3px; padding: 2px 7px; cursor: pointer; }
    </style>
</head>
<body>
<h2>🛠️ 계층형 인프라 정보 관리</h2>

<form action="/infra/edit" method="post" th:object="${appData}">
    <div id="tierContainer">
        <div class="tier-card" th:each="group, gStat : *{infraTierGroups}">
            <div class="tier-header">
                Tier 명: <input type="text"
                               th:name="|infraTierGroups[${gStat.index}].tier|"
                               th:value="${group.tier}"
                               placeholder="예: Web, DB">
                <button type="button" onclick="this.closest('.tier-card').remove()">이 Tier 삭제</button>
            </div>

            <table>
                <thead>
                <tr>
                    <th>host/port</th>
                    <th>domain</th>
                    <th>Port (F/W)</th>
                    <th>SSL</th>
                    <th>Application</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="item, iStat : ${group.items}">
                    <!-- 메인 아이템 행 -->
                    <tr>
                        <input type="hidden"
                               th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].id|"
                               th:value="${item.id}">
                        <td><input type="text"
                                   th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].host|"
                                   th:value="${item.host}"></td>
                        <td><input type="text"
                                   th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].domain|"
                                   th:value="${item.domain}"></td>
                        <td><input type="text"
                                   th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].port|"
                                   th:value="${item.port}"></td>
                        <td><input type="text"
                                   th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].ssl|"
                                   th:value="${item.ssl}"></td>
                        <td><input type="text"
                                   th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].application|"
                                   th:value="${item.application}"></td>
                        <td style="white-space:nowrap;">
                            <button type="button" class="btn-deploy-toggle" onclick="toggleDeployConfig(this)">⚙ 배포설정</button>
                            <button type="button" onclick="deleteRow(this)">X</button>
                        </td>
                    </tr>
                    <!-- 배포 설정 행 (기본 숨김) -->
                    <tr class="deploy-config-row" style="display:none;">
                        <td colspan="6">
                            <strong style="font-size:12px; color:#444;">⚙ 배포 설정 (SSH + Portainer)</strong>
                            <div class="deploy-config-grid">
                                <div class="field-group">
                                    <label>SSH Host (비워두면 host 사용)</label>
                                    <input type="text"
                                           th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].deployConfig.sshHost|"
                                           th:value="${item.deployConfig != null ? item.deployConfig.sshHost : ''}"
                                           placeholder="예: 192.168.1.10">
                                </div>
                                <div class="field-group">
                                    <label>SSH Port</label>
                                    <input type="text"
                                           th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].deployConfig.sshPort|"
                                           th:value="${item.deployConfig != null and item.deployConfig.sshPort != null ? item.deployConfig.sshPort : 22}"
                                           placeholder="22">
                                </div>
                                <div class="field-group">
                                    <label>SSH User *</label>
                                    <input type="text"
                                           th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].deployConfig.sshUser|"
                                           th:value="${item.deployConfig != null ? item.deployConfig.sshUser : ''}"
                                           placeholder="예: ubuntu">
                                </div>
                                <div class="field-group">
                                    <label>SSH Key Path</label>
                                    <input type="text"
                                           th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].deployConfig.sshKeyPath|"
                                           th:value="${item.deployConfig != null ? item.deployConfig.sshKeyPath : ''}"
                                           placeholder="예: /home/rusty/.ssh/id_rsa">
                                </div>
                                <div class="field-group">
                                    <label>Key Passphrase (있을 경우)</label>
                                    <input type="text"
                                           th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].deployConfig.sshKeyPassphrase|"
                                           th:value="${item.deployConfig != null ? item.deployConfig.sshKeyPassphrase : ''}"
                                           placeholder="패스프레이즈 없으면 빈칸">
                                </div>
                                <div class="field-group">
                                    <label>SSH Password</label>
                                    <input type="text"
                                           th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].deployConfig.sshPassword|"
                                           th:value="${item.deployConfig != null ? item.deployConfig.sshPassword : ''}"
                                           placeholder="키 인증 시 불필요">
                                </div>
                                <div class="field-group">
                                    <label>Build Script Path</label>
                                    <input type="text"
                                           th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].deployConfig.buildScriptPath|"
                                           th:value="${item.deployConfig != null and item.deployConfig.buildScriptPath != null ? item.deployConfig.buildScriptPath : './build.sh'}"
                                           placeholder="./build.sh">
                                </div>
                                <div class="field-group" style="grid-column: span 2;">
                                    <label>Docker Deploy Command</label>
                                    <input type="text"
                                           th:name="|infraTierGroups[${gStat.index}].items[${iStat.index}].deployConfig.dockerDeployCmd|"
                                           th:value="${item.deployConfig != null and item.deployConfig.dockerDeployCmd != null ? item.deployConfig.dockerDeployCmd : 'docker stack deploy -c docker-compose.yml myapp'}"
                                           placeholder="docker stack deploy -c docker-compose.yml myapp">
                                </div>
                            </div>
                        </td>
                    </tr>
                </th:block>
                </tbody>
            </table>
            <div style="margin-top: 10px; text-align: right;">
                <button type="button" th:attr="onclick=|addItem(this, ${gStat.index})|">+ 이 Tier에 서버 추가</button>
            </div>
        </div>
    </div>

    <div style="margin-top: 20px; border-top: 2px solid #ccc; padding-top: 20px;">
        <button type="button" onclick="addTier()">+ 새로운 Tier 그룹 추가</button>
        <button type="submit" class="btn-save">전체 저장</button>
        <a href="/"><button type="button" style="padding: 10px;">취소</button></a>
    </div>
</form>

<script>
    function generateId() {
        return Math.random().toString(36).substring(2, 14);
    }

    function toggleDeployConfig(btn) {
        const tr = btn.closest('tr');
        const nextTr = tr.nextElementSibling;
        if (nextTr && nextTr.classList.contains('deploy-config-row')) {
            nextTr.style.display = nextTr.style.display === 'none' ? '' : 'none';
        }
    }

    function deleteRow(btn) {
        const tr = btn.closest('tr');
        const tbody = tr.closest('tbody');
        const tierCard = tr.closest('.tier-card');
        const nextTr = tr.nextElementSibling;
        if (nextTr && nextTr.classList.contains('deploy-config-row')) {
            nextTr.remove();
        }
        tr.remove();
        reindexRows(tbody, tierCard);
    }

    function reindexRows(tbody, tierCard) {
        const input = tierCard.querySelector('input[name*="infraTierGroups["]');
        if (!input) return;
        const match = input.name.match(/infraTierGroups\[(\d+)\]/);
        if (!match) return;
        const gIndex = parseInt(match[1]);

        let iIndex = 0;
        Array.from(tbody.children).forEach(function(row) {
            if (row.classList.contains('deploy-config-row')) return;
            row.querySelectorAll('input').forEach(function(inp) {
                if (inp.name) {
                    inp.name = inp.name.replace(
                        /infraTierGroups\[\d+\]\.items\[\d+\]/g,
                        'infraTierGroups[' + gIndex + '].items[' + iIndex + ']'
                    );
                }
            });
            // 뒤따르는 deploy-config-row 도 같이 재인덱싱
            const nextRow = row.nextElementSibling;
            if (nextRow && nextRow.classList.contains('deploy-config-row')) {
                nextRow.querySelectorAll('input').forEach(function(inp) {
                    if (inp.name) {
                        inp.name = inp.name.replace(
                            /infraTierGroups\[\d+\]\.items\[\d+\]/g,
                            'infraTierGroups[' + gIndex + '].items[' + iIndex + ']'
                        );
                    }
                });
            }
            iIndex++;
        });
    }

    function addItem(btn, gIndex) {
        const tbody = btn.closest('.tier-card').querySelector('tbody');
        // deploy-config-row 를 제외한 실제 아이템 개수
        const iIndex = Array.from(tbody.children).filter(function(r) {
            return !r.classList.contains('deploy-config-row');
        }).length;
        const itemId = generateId();

        const mainRow = `
            <tr>
                <input type="hidden" name="infraTierGroups[${gIndex}].items[${iIndex}].id" value="${itemId}">
                <td><input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].host"></td>
                <td><input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].domain"></td>
                <td><input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].port"></td>
                <td><input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].ssl"></td>
                <td><input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].application"></td>
                <td style="white-space:nowrap;">
                    <button type="button" class="btn-deploy-toggle" onclick="toggleDeployConfig(this)">⚙ 배포설정</button>
                    <button type="button" onclick="deleteRow(this)">X</button>
                </td>
            </tr>`;
        const deployRow = `
            <tr class="deploy-config-row" style="display:none;">
                <td colspan="6">
                    <strong style="font-size:12px; color:#444;">⚙ 배포 설정 (SSH + Portainer)</strong>
                    <div class="deploy-config-grid">
                        <div class="field-group">
                            <label>SSH Host</label>
                            <input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].deployConfig.sshHost" placeholder="예: 192.168.1.10">
                        </div>
                        <div class="field-group">
                            <label>SSH Port</label>
                            <input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].deployConfig.sshPort" value="22">
                        </div>
                        <div class="field-group">
                            <label>SSH User *</label>
                            <input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].deployConfig.sshUser" placeholder="예: ubuntu">
                        </div>
                        <div class="field-group">
                            <label>SSH Key Path</label>
                            <input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].deployConfig.sshKeyPath" placeholder="예: /home/user/.ssh/id_rsa">
                        </div>
                        <div class="field-group">
                            <label>SSH Password</label>
                            <input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].deployConfig.sshPassword">
                        </div>
                        <div class="field-group">
                            <label>Build Script Path</label>
                            <input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].deployConfig.buildScriptPath" value="./build.sh">
                        </div>
                        <div class="field-group" style="grid-column: span 2;">
                            <label>Docker Deploy Command</label>
                            <input type="text" name="infraTierGroups[${gIndex}].items[${iIndex}].deployConfig.dockerDeployCmd" value="docker stack deploy -c docker-compose.yml myapp">
                        </div>
                    </div>
                </td>
            </tr>`;
        tbody.insertAdjacentHTML('beforeend', mainRow + deployRow);
    }

    function addTier() {
        const container = document.getElementById('tierContainer');
        const gIndex = container.children.length;
        const itemId = generateId();
        const html = `
            <div class="tier-card">
                <div class="tier-header">
                    Tier 명: <input type="text" name="infraTierGroups[${gIndex}].tier" placeholder="새 Tier">
                    <button type="button" onclick="this.closest('.tier-card').remove()">이 Tier 삭제</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>host/port</th><th>domain</th><th>Port (F/W)</th><th>SSL</th><th>Application</th><th>관리</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <input type="hidden" name="infraTierGroups[${gIndex}].items[0].id" value="${itemId}">
                            <td><input type="text" name="infraTierGroups[${gIndex}].items[0].host"></td>
                            <td><input type="text" name="infraTierGroups[${gIndex}].items[0].domain"></td>
                            <td><input type="text" name="infraTierGroups[${gIndex}].items[0].port"></td>
                            <td><input type="text" name="infraTierGroups[${gIndex}].items[0].ssl"></td>
                            <td><input type="text" name="infraTierGroups[${gIndex}].items[0].application"></td>
                            <td style="white-space:nowrap;">
                                <button type="button" class="btn-deploy-toggle" onclick="toggleDeployConfig(this)">⚙ 배포설정</button>
                                <button type="button" onclick="deleteRow(this)">X</button>
                            </td>
                        </tr>
                        <tr class="deploy-config-row" style="display:none;">
                            <td colspan="6">
                                <strong style="font-size:12px; color:#444;">⚙ 배포 설정 (SSH + Portainer)</strong>
                                <div class="deploy-config-grid">
                                    <div class="field-group">
                                        <label>SSH Host</label>
                                        <input type="text" name="infraTierGroups[${gIndex}].items[0].deployConfig.sshHost" placeholder="예: 192.168.1.10">
                                    </div>
                                    <div class="field-group">
                                        <label>SSH Port</label>
                                        <input type="text" name="infraTierGroups[${gIndex}].items[0].deployConfig.sshPort" value="22">
                                    </div>
                                    <div class="field-group">
                                        <label>SSH User *</label>
                                        <input type="text" name="infraTierGroups[${gIndex}].items[0].deployConfig.sshUser" placeholder="예: ubuntu">
                                    </div>
                                    <div class="field-group">
                                        <label>SSH Key Path</label>
                                        <input type="text" name="infraTierGroups[${gIndex}].items[0].deployConfig.sshKeyPath" placeholder="예: /home/user/.ssh/id_rsa">
                                    </div>
                                    <div class="field-group">
                                        <label>SSH Password</label>
                                        <input type="text" name="infraTierGroups[${gIndex}].items[0].deployConfig.sshPassword">
                                    </div>
                                    <div class="field-group">
                                        <label>Build Script Path</label>
                                        <input type="text" name="infraTierGroups[${gIndex}].items[0].deployConfig.buildScriptPath" value="./build.sh">
                                    </div>
                                    <div class="field-group" style="grid-column: span 2;">
                                        <label>Docker Deploy Command</label>
                                        <input type="text" name="infraTierGroups[${gIndex}].items[0].deployConfig.dockerDeployCmd" value="docker stack deploy -c docker-compose.yml myapp">
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div style="margin-top: 10px; text-align: right;">
                    <button type="button" onclick="addItem(this, ${gIndex})">+ 이 Tier에 서버 추가</button>
                </div>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    }
</script>
</body>
</html>
